<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario 2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

<h3>Ingrese información al formulario</h3>

<form>

<div class="mb-3">
  <label>Dive site:</label>
  <input type="text" class="form-control" placeholder="Ej: Al Rook">
</div>

<div class="mb-3">
  <label>Region:</label>
  <input type="text" class="form-control" placeholder="Ej: Egypt">
</div>

<div class="mb-3">
  <label>Date:</label>
  <input type="date" class="form-control">
</div>

<div class="mb-3">
  <label>Max depth (feet):</label>
  <input type="number" class="form-control">
</div>

<div class="mb-3">
  <label>Bottom time (minutes):</label>
  <input type="number" class="form-control">
</div>

<div class="form-check mb-3">
  <input type="checkbox" class="form-check-input">
  <label class="form-check-label">Nightdive</label>
</div>

<div class="mb-3">
  <label>Comment:</label>
  <textarea class="form-control"></textarea>
</div>

<button class="btn btn-success">Save</button>

</form>

</div>

</body>
</html>
